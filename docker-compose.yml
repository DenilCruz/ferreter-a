services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
      # Protegemos la carpeta vendor del contenedor para que no se sobreescriba
      - /var/www/vendor 
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=sail
      - DB_PASSWORD=password
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=sail
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - "3307:3306"
    volumes:
      # Guardamos los datos de MySQL en un volumen para no perderlos
      - mysql_data:/var/lib/mysql 

# Declaramos el volumen de la base de datos
volumes:
  mysql_data: